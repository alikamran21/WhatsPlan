# Pin the Compose project name so it's isolated from the other stacks already
# running on this VM (phantasm_*, nextjs-app). `docker compose down/up` here only
# touches whatsplan-* containers.
name: whatsplan

services:
  # ── Backend: WhatsApp listener + classifier + API ─────────────────────
  api:
    build: ./server
    container_name: whatsplan-api
    # Headless Chromium (whatsapp-web.js) crashes with "Target closed" when the
    # container's shared memory is too small. Give it a roomy /dev/shm.
    shm_size: "1gb"
    ports:
      # 4000 is free on this VM (not used by phantasm_* / nextjs-app).
      - "4000:4000"
    environment:
      # Use the system Chromium baked into the image (set here so it can't be
      # overridden by an empty value in server/.env).
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    env_file:
      # Loads server/.env into the container (EMAIL_PROVIDER, keys, etc.).
      # Create it first: copy server/.env.example to server/.env.
      - ./server/.env
    volumes:
      # Persists the WhatsApp login + local store so you don't rescan the QR
      # on every restart.
      - wa-data:/app/data
    restart: unless-stopped

  # ── Frontend: the React/TanStack app (dev server) ─────────────────────
  web:
    build:
      context: .
      args:
        # Production build inlines VITE_API_URL into the client bundle at build
        # time. Served behind nginx at https://whatsplan.social, which routes
        # /api/* and /socket.io/* to the api container (same-origin backend).
        VITE_API_URL: ${VITE_API_URL:-https://whatsplan.social}
    container_name: whatsplan-web
    ports:
      # Host 8090 → container 8080 (the SSR Node server). 8080/3000/5000 are
      # already taken on this VM, so the frontend is published on 8090.
      - "8090:8080"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  wa-data:
