name: Auto-Deploy WhatsPlan to VM

on:
  push:
    branches:
      - main

# Reuses the SAME secrets as your other repo (they point at the same VM):
#   SERVER_HOST     – VM IP / hostname
#   SERVER_USER     – SSH user (needs passwordless sudo, like the Serenitycare deploy)
#   SERVER_SSH_KEY  – private SSH key for that user
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            APP_DIR="$HOME/WhatsPlan"

            # Clone on first run; otherwise sync the existing checkout.
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/alikamran21/WhatsPlan.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            # Force the VM to match origin/main exactly. No sudo on git — the repo
            # is owned by $USER, and sudo'd git would trip "dubious ownership".
            git config --global --add safe.directory "$APP_DIR" || true
            git fetch --all
            git reset --hard origin/main

            # Rebuild + restart ONLY the whatsplan-* containers. Scoped to the
            # compose project "whatsplan" — your phantasm_* / nextjs-app stacks
            # are left untouched.
            sudo docker compose down
            sudo docker compose up -d --build

            # Drop dangling images from the rebuild.
            sudo docker image prune -f
