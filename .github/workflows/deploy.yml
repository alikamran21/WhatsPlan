name: Auto-Deploy WhatsPlan to VM

on:
  push:
    branches:
      - main

# Reuses the SAME secrets as your other repo (they point at the same VM):
#   SERVER_HOST     – VM IP / hostname
#   SERVER_USER     – SSH user (needs passwordless sudo, like the Serenitycare deploy)
#   SERVER_SSH_KEY  – private SSH key for that user
#
# The repo is PRIVATE, so the VM has no GitHub credentials to `git fetch` with.
# We pass the workflow's built-in GITHUB_TOKEN (read access to this repo, expires
# when the run ends) to the VM and fetch over an authenticated URL — no deploy
# key / PAT to manage, and the repo can stay private.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GH_TOKEN
          script: |
            set -e
            APP_DIR="$HOME/WhatsPlan"
            REPO="https://x-access-token:${GH_TOKEN}@github.com/alikamran21/WhatsPlan.git"

            # Clone on first run; otherwise just sync the existing checkout.
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR" || true

            # Force the VM to match origin/main exactly. Fetch with the token so a
            # PRIVATE repo works without storing any credential on the VM.
            git fetch "$REPO" main
            git reset --hard FETCH_HEAD

            # Build the new images BEFORE swapping, so a build failure leaves the
            # currently-running site untouched (no down-then-failed-up outage).
            sudo docker compose build
            sudo docker compose up -d
            sudo docker image prune -f
